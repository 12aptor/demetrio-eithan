<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotos Infinitas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div id="auth-overlay" class="auth-overlay">
        <div class="auth-card">
            <h2 class="auth-title">Fotos Infinitas</h2>
            <p class="auth-subtitle">Introduce el código de acceso para entrar</p>
            <div class="auth-input-container">
                <input type="password" id="auth-input" maxlength="6" placeholder="••••••" autofocus />
            </div>
            <div id="auth-error" class="auth-error">Código incorrecto. Inténtalo de nuevo.</div>
            <button id="auth-submit" class="auth-btn">Acceder</button>
        </div>
    </div>

    <canvas id="canvas"></canvas>
    <script src="index.js"></script>
</body>

</html>
